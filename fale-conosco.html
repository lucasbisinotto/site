    <main>
        <form action="" method="get">
            <fieldset>
                <legend>Fale conosco</legend>
                <label for="idName">Nome:</label>
                <input type="text" id="idName" name="userName" required>
                <br>

                <label for="idEmail">E-mail:</label>
                <input type="email" id="idEmail" name="email" required>
                <br>

                <label for="idPhone">Telefone:</label>
                <input id="idPhone" type="tel" name="phone" pattern="[0-9]{11}" placeholder="DDD+número">
                <br>

                <label for="mensagem">Mensagem:</label>
                <textarea name="comentario" id="mensagem"></textarea>
                <br>
            </fieldset>

            <button type="submit">Enviar</button>
            <br>
            <br>
            <a href="index.html">Voltar para página inicial</a>
        </form>
